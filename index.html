<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 Surat Untukmu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #a8d8ea 0%, #f0f4ff 30%, #e8daf7 70%, #aa96da 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0.4;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* Stars */
        .star {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        /* Music Button */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #aa96da;
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(170, 150, 218, 0.3);
        }

        .music-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(170, 150, 218, 0.5);
        }

        .music-btn.playing {
            background: linear-gradient(135deg, #a8d8ea, #aa96da);
            border-color: transparent;
        }

        .music-btn.playing .music-label {
            color: white;
        }

        .equalizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 18px;
        }

        .eq-bar {
            width: 3px;
            background: #aa96da;
            border-radius: 2px;
            transition: height 0.2s;
        }

        .music-btn.playing .eq-bar {
            background: white;
            animation: eqBounce 0.8s ease-in-out infinite alternate;
        }

        .eq-bar:nth-child(1) { height: 6px; animation-delay: 0s; }
        .eq-bar:nth-child(2) { height: 12px; animation-delay: 0.2s; }
        .eq-bar:nth-child(3) { height: 8px; animation-delay: 0.4s; }
        .eq-bar:nth-child(4) { height: 14px; animation-delay: 0.1s; }
        .eq-bar:nth-child(5) { height: 5px; animation-delay: 0.3s; }

        @keyframes eqBounce {
            0% { height: 4px; }
            100% { height: 18px; }
        }

        .music-label {
            font-size: 12px;
            font-weight: bold;
            color: #aa96da;
            white-space: nowrap;
        }

        /* Envelope */
        .envelope-wrapper {
            perspective: 1000px;
            cursor: pointer;
            margin: 40px 0;
        }

        .envelope {
            position: relative;
            width: 280px;
            height: 180px;
            background: linear-gradient(145deg, #a8d8ea, #87c4d4);
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(168, 216, 234, 0.4);
            animation: float 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        .envelope:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(168, 216, 234, 0.6);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Envelope Flap */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(145deg, #8ec5d6, #7bb8cc);
            border-radius: 10px 10px 0 0;
            transform-origin: top center;
            transition: transform 0.6s ease;
            z-index: 2;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
        }

        .envelope.opened .envelope-flap {
            transform: rotateX(180deg);
        }

        /* Heart Seal */
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #aa96da, #8b6fc0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 3;
            box-shadow: 0 4px 12px rgba(170, 150, 218, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Envelope Decoration */
        .envelope::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(135deg, transparent 33%, rgba(255,255,255,0.1) 33%, rgba(255,255,255,0.1) 66%, transparent 66%);
            border-radius: 0 0 10px 10px;
        }

        .hint-text {
            text-align: center;
            margin-top: 20px;
            color: #7b6ca5;
            font-size: 14px;
            opacity: 0.8;
            animation: fadeInOut 2s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Letter */
        .letter-container {
            display: none;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.8s ease;
            margin-top: 30px;
            padding-bottom: 40px;
        }

        .letter-container.show {
            display: block;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .letter {
            background: white;
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(170, 150, 218, 0.2);
            border: 2px solid rgba(168, 216, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .letter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #a8d8ea, #aa96da, #a8d8ea);
        }

        .letter h2 {
            color: #5b4a8a;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .letter p {
            color: #6b5e8a;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
            text-align: center;
        }

        .letter .signature {
            text-align: right;
            color: #aa96da;
            font-style: italic;
            margin-top: 25px;
            font-size: 14px;
        }

        /* Photo */
        .letter-photo {
            width: 100%;
            max-width: 300px;
            display: block;
            margin: 20px auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 3px solid rgba(168, 216, 234, 0.5);
        }

        .photo-placeholder {
            width: 100%;
            max-width: 300px;
            height: 200px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0f4ff, #e8daf7);
            border-radius: 12px;
            border: 2px dashed #aa96da;
            font-size: 40px;
        }

        /* Close Button */
        .close-btn {
            display: block;
            margin: 25px auto 0;
            padding: 12px 30px;
            background: linear-gradient(135deg, #a8d8ea, #aa96da);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(170, 150, 218, 0.3);
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(170, 150, 218, 0.5);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .envelope {
                width: 240px;
                height: 155px;
            }

            .letter {
                padding: 25px 20px;
            }

            .letter h2 {
                font-size: 20px;
            }

            .music-btn {
                top: 15px;
                right: 15px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Stars -->
    <div id="stars"></div>

    <!-- Music Button -->
    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">
        <div class="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
        <span class="music-label" id="musicLabel">Play Music</span>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Envelope -->
        <div class="envelope-wrapper" id="envelopeWrapper" onclick="openEnvelope()">
            <div class="envelope" id="envelope">
                <div class="envelope-flap"></div>
                <div class="seal">💜</div>
            </div>
            <p class="hint-text" id="hintText">✨ Ketuk untuk membuka ✨</p>
        </div>

        <!-- Letter Content -->
        <div class="letter-container" id="letterContainer">
            <div class="letter">
                <h2>Hai 👋</h2>

                <!-- FOTO: Hapus komentar baris di bawah & hapus photo-placeholder -->
                <!-- <img src="foto.jpg" alt="Foto" class="letter-photo"> -->
                <div class="photo-placeholder">🌸</div>

                <p>Terima kasih sudah berjuang untuk dirimu.</p>
                <p>Kamu hebat, lebih dari yang kamu kira. 💜</p>
                <p>Setiap langkah kecil yang kamu ambil itu berarti.</p>

                <p class="signature">— dengan sayang 🌷</p>
            </div>

            <button class="close-btn" onclick="closeLetter()">Tutup Surat 💌</button>
        </div>
    </div>

    <script>
        // Generate particles
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 12 + 5;
            const colors = ['#a8d8ea', '#aa96da', '#d4b8e8', '#87c4d4', '#f0f4ff'];
            particle.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                left: ${Math.random() * 100}%;
                animation-duration: ${Math.random() * 10 + 8}s;
                animation-delay: ${Math.random() * 5}s;
            `;
            particlesEl.appendChild(particle);
        }

        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation-delay: ${Math.random() * 3}s;
            `;
            starsEl.appendChild(star);
        }

        // Music toggle
        let isPlaying = false;
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicLabel = document.getElementById('musicLabel');

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.classList.remove('playing');
                musicLabel.textContent = 'Play Music';
            } else {
                music.play();
                musicBtn.classList.add('playing');
                musicLabel.textContent = 'Now Playing';
            }
            isPlaying = !isPlaying;
        }

        // Open envelope
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const hintText = document.getElementById('hintText');
            const letterContainer = document.getElementById('letterContainer');

            envelope.classList.add('opened');
            hintText.style.display = 'none';

            setTimeout(() => {
                envelopeWrapper.style.display = 'none';
                letterContainer.classList.add('show');
            }, 800);
        }

        // Close letter
        function closeLetter() {
            const envelope = document.getElementById('envelope');
            const envelopeWrapper = document.getElementById('envelopeWrapper');
            const hintText = document.getElementById('hintText');
            const letterContainer = document.getElementById('letterContainer');

            letterContainer.classList.remove('show');
            envelopeWrapper.style.display = 'block';
            envelope.classList.remove('opened');
            hintText.style.display = 'block';
        }
    </script>
</body>
</html>
