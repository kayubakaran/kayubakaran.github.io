<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 Surat Untukmu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a8d8ff 0%, #ffffff 40%, #e8d5f5 70%, #b8a9e8 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0.4;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Stars */
        .star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        /* Music Control */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(138, 100, 200, 0.2);
            border: 1px solid rgba(184, 169, 232, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(138, 100, 200, 0.3);
        }

        .music-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #a8d8ff, #b8a9e8);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            transform: rotate(10deg);
        }

        .music-label {
            font-size: 13px;
            color: #6b5b8a;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 500;
        }

        .music-bars {
            display: flex;
            align-items: end;
            gap: 2px;
            height: 16px;
        }

        .music-bars span {
            width: 3px;
            background: linear-gradient(to top, #a8d8ff, #b8a9e8);
            border-radius: 2px;
            animation: musicBar 0.8s ease infinite alternate;
        }

        .music-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .music-bars span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
        .music-bars span:nth-child(3) { height: 8px; animation-delay: 0.4s; }
        .music-bars span:nth-child(4) { height: 14px; animation-delay: 0.1s; }

        @keyframes musicBar {
            0% { transform: scaleY(0.4); }
            100% { transform: scaleY(1); }
        }

        .music-bars.paused span {
            animation-play-state: paused;
            transform: scaleY(0.3);
        }

        /* Container */
        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Envelope */
        .envelope-wrapper {
            cursor: pointer;
            position: relative;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            width: 280px;
            height: 180px;
            background: linear-gradient(145deg, #89c4f4 0%, #6bb3e0 50%, #5ba3d9 100%);
            border-radius: 0 0 12px 12px;
            position: relative;
            box-shadow: 0 15px 40px rgba(100, 150, 200, 0.3),
                        0 5px 15px rgba(138, 100, 200, 0.2);
            animation: floatEnvelope 3s ease-in-out infinite;
        }

        @keyframes floatEnvelope {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-top: 100px solid #7bb8e0;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 5;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 140px solid transparent;
            border-right: 140px solid transparent;
            border-bottom: 90px solid #6ba8d4;
            z-index: 3;
        }

        /* Heart Seal */
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #b8a9e8, #9b7fd4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            z-index: 10;
            box-shadow: 0 3px 10px rgba(138, 100, 200, 0.4);
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .envelope.open .seal {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Hint Text */
        .hint {
            margin-top: 25px;
            color: #7b6b9a;
            font-size: 15px;
            font-family: 'Segoe UI', sans-serif;
            animation: fadeInOut 2s ease infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .hint.hidden {
            display: none;
        }

        /* Letter */
        .letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            background: white;
            border-radius: 8px;
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.8s ease 0.3s;
            z-index: 4;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .envelope.open .letter {
            max-height: 400px;
            top: -220px;
            padding: 25px;
        }

        .letter-content {
            opacity: 0;
            transition: opacity 0.5s ease 0.8s;
        }

        .envelope.open .letter-content {
            opacity: 1;
        }

        .letter h2 {
            color: #6b5b8a;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .letter p {
            color: #555;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .letter .signature {
            color: #b8a9e8;
            font-style: italic;
            margin-top: 15px;
            font-size: 14px;
        }

        /* Photo in Letter */
        .letter-photo {
            width: 100%;
            max-width: 200px;
            border-radius: 10px;
            margin: 12px auto;
            display: block;
            box-shadow: 0 4px 12px rgba(138, 100, 200, 0.2);
            border: 3px solid #e8d5f5;
        }

        .photo-placeholder {
            width: 100%;
            max-width: 200px;
            height: 120px;
            border-radius: 10px;
            margin: 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f0e8ff, #e0f0ff);
            border: 2px dashed #b8a9e8;
            font-size: 30px;
        }

        /* Close Button */
        .close-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #a8d8ff, #b8a9e8);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI', sans-serif;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(138, 100, 200, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .envelope {
                width: 240px;
                height: 155px;
            }
            .envelope-flap {
                border-left: 120px solid transparent;
                border-right: 120px solid transparent;
                border-top: 85px solid #7bb8e0;
            }
            .envelope-front {
                border-left: 120px solid transparent;
                border-right: 120px solid transparent;
                border-bottom: 75px solid #6ba8d4;
            }
            .letter {
                width: 200px;
            }
            .envelope.open .letter {
                top: -200px;
            }
            .music-control {
                top: 15px;
                right: 15px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Control Button -->
    <div class="music-control" onclick="toggleMusic()">
        <button class="music-btn" id="musicBtn">▶</button>
        <div class="music-bars paused" id="musicBars">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span class="music-label" id="musicLabel">Play Music</span>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="envelope-wrapper" onclick="openEnvelope()">
            <div class="envelope" id="envelope">
                <div class="envelope-flap"></div>
                <div class="seal">💜</div>
                <div class="envelope-front"></div>

                <!-- Letter inside -->
                <div class="letter">
                    <div class="letter-content">
                        <h2>Hai 👋</h2>
                        <p>Terima kasih sudah berjuang untuk dirimu.</p>
                        <p>Kamu hebat, lebih dari yang kamu kira. Apapun yang sedang kamu lalui sekarang, kamu sudah melakukannya dengan sangat baik. 🌷</p>

                        <!-- FOTO: Hapus komentar baris di bawah dan hapus photo-placeholder -->
                        <!-- <img src="foto.jpg" alt="Foto" class="letter-photo"> -->
                        <div class="photo-placeholder">🌸</div>

                        <p class="signature">— Dengan sayang 💜</p>
                        <button class="close-btn" onclick="event.stopPropagation(); closeEnvelope()">Tutup Surat ✉️</button>
                    </div>
                </div>
            </div>
        </div>
        <p class="hint" id="hint">✨ Ketuk amplop untuk membuka ✨</p>
    </div>

    <!-- Stars -->
    <script>
        // Create stars
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            document.body.appendChild(star);
        }

        // Create particles
        const particlesContainer = document.getElementById('particles');
        const colors = ['#a8d8ff', '#b8a9e8', '#e8d5f5', '#89c4f4', '#d4b8e8', '#c8e8ff'];
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = (Math.random() * 12 + 5) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';
            particlesContainer.appendChild(particle);
        }

        // Music toggle
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicBars = document.getElementById('musicBars');
        const musicLabel = document.getElementById('musicLabel');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicBtn.textContent = '▶';
                musicBars.classList.add('paused');
                musicLabel.textContent = 'Play Music';
                isPlaying = false;
            } else {
                music.play();
                musicBtn.textContent = '⏸';
                musicBars.classList.remove('paused');
                musicLabel.textContent = 'Now Playing';
                isPlaying = true;
            }
        }

        // Envelope open/close
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            const hint = document.getElementById('hint');
            envelope.classList.add('open');
            hint.classList.add('hidden');
        }

        function closeEnvelope() {
            const envelope = document.getElementById('envelope');
            const hint = document.getElementById('hint');
            envelope.classList.remove('open');
            hint.classList.remove('hidden');
        }
    </script>
</body>
</html>
